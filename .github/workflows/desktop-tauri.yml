name: Desktop Tauri Preview

on:
  push:
    branches: ["main", "feat/tauri-multiplatform"]
  pull_request:
    branches: ["main"]

jobs:
  desktop-tauri:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-24.04]

    defaults:
      run:
        working-directory: apps/desktop-tauri

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file
        working-directory: .

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tauri source safety checks
        run: bash ../../scripts/check_tauri_sources.sh

      - name: Run frontend unit tests
        run: pnpm test -- --run

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri desktop preview
        run: pnpm tauri build --no-bundle --ci
