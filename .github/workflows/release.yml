name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shell test dependencies
        run: brew install ripgrep

      - name: Install Python test dependencies
        run: python3 -m pip install --user pillow

      - name: Run behavior tests
        run: bash Tests/run_behavior_tests.sh

      - name: Build unsigned DMG
        run: scripts/package_dmg.sh --rebuild

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/QuotaRadar.dmg
          body: |
            Quota Radar macOS build.

            What's new in ${{ github.ref_name }}:
            - Claude, Codex, Kimi, and OpenCode Go subscription providers can store companion API keys for copying and management while using web login authorization for quota checks.
            - Added network proxy settings, immediate refresh after adding or editing credentials, and safer reauthentication target selection when multiple accounts exist.
            - Quota Overview, Credentials, and Diagnostics now show configured providers only, so empty provider placeholders no longer crowd the main window.
            - The menu bar popover now prioritizes quota risk, low-quota providers, and items needing attention instead of rendering the full provider grid.
            - The main quota overview uses Key Quota / Credential Pool / Critical Time / Status for clearer multi-key and multi-window monitoring.
            - Multi-window subscription quotas no longer repeat the 5-hour/weekly/monthly text in credential rows; plan expiry dates include the year for annual plans.

            中文说明：
            - Claude、Codex、Kimi、OpenCode Go 等订阅 provider 支持保存配套 API Key 便于复制和管理，额度查询仍使用网页登录授权。
            - 新增网络代理设置；新增或编辑凭据后会立即刷新；多个账号重新认证时会明确保存目标。
            - 额度监控、配置凭据和诊断只展示已配置 provider，未配置 provider 不再占用主界面空间。
            - 状态栏弹窗改为额度风险、额度紧张和需要关注优先，不再展示完整 provider 网格。
            - 主程序额度监控使用关键额度 / 凭据池 / 关键时间 / 状态，更适合多 key 和多周期监控。
            - 多周期订阅额度不再在凭据行重复显示 5 小时/周/月文本；套餐到期日期会显示年份，适合一年期套餐。

            This DMG is unsigned and not notarized because the project does not use a paid Apple Developer ID. macOS Gatekeeper may block the first launch after download. Only install it if you trust this repository and release.

            If macOS reports that the app is damaged or cannot be opened, install the app into /Applications and run:

            ```bash
            xattr -dr com.apple.quarantine '/Applications/Quota Radar.app'
            open '/Applications/Quota Radar.app'
            ```
